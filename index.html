<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Interactive Web Demo</title>
</head>

<body style="margin:0; font-family:Arial; background:#0b0b0f; color:white; text-align:center;">

  <!-- HERO -->
  <div style="padding:80px 20px; background:linear-gradient(135deg,#0f0f1a,#1a1a2e);">
    <h1 style="font-size:40px; margin:0;">⚡ Webs Interactivas Modernas</h1>
    <p style="font-size:18px; opacity:0.8;">
      Diseño + Animación + Experiencia visual inmersiva
    </p>

    <button onclick="alert('Contacto iniciado 👋')" 
      style="margin-top:20px; padding:12px 20px; font-size:16px; border:none; border-radius:8px; cursor:pointer;">
      Quiero mi web
    </button>
  </div>

  <!-- DEMO VISUAL -->
  <div style="padding:60px 20px;">
    <h2>🔥 Demo interactiva</h2>

    <button onclick="this.innerText='💥 Click detectado'"
      style="padding:15px 25px; font-size:16px; margin-top:20px; cursor:pointer;">
      Haz clic aquí
    </button>
  </div>

  <!-- SERVICIOS -->
  <div style="padding:60px 20px; background:#111;">
    <h2>💼 Qué ofrezco</h2>
    <p>✔ Webs modernas</p>
    <p>✔ Animaciones</p>
    <p>✔ Diseño personalizado</p>
    <p>✔ Experiencia interactiva</p>
  </div>

  <!-- CONTACTO -->
  <div style="padding:60px 20px;">
    <h2>📩 Contacto</h2>
    <p>Escríbeme para tu proyecto web</p>
  </div>

</body>
</html>

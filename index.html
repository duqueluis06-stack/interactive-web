<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Web Premium</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #000);
  transition: 0.5s;
}

/* NAV */
nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  background: rgba(0,0,0,0.7);
}

nav button {
  flex: 1 1 40%;
  max-width: 150px;
  background: transparent;
  border: 1px solid #0ff;
  color: #0ff;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* SECCIONES */
.section {
  display: none;
  padding: 60px 15px;
}

.active {
  display: block;
}

/* TEXTO */
h1 {
  font-size: 28px;
  text-shadow: 0 0 10px #0ff;
}

p {
  font-size: 16px;
}

/* CARD */
.card {
  margin: 15px auto;
  max-width: 90%;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

/* BOTONES */
.neon-btn {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  margin: 10px;
  border: 2px solid #0ff;
  background: transparent;
  color: #0ff;
  border-radius: 10px;
  cursor: pointer;
}

/* COLORES */
.colors {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.color {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
}

/* DESKTOP AJUSTES */
@media(min-width:768px){

  h1 {
    font-size: 42px;
  }

  nav button {
    flex: none;
  }

  .neon-btn {
    width: auto;
  }

  .card {
    max-width: 600px;
  }

}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <button onclick="showTab('home')">Inicio</button>
  <button onclick="showTab('demo')">Demo</button>
  <button onclick="showTab('style')">Estilo</button>
  <button onclick="showTab('contact')">Contacto</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <h1>⚡ Webs Interactivas Premium</h1>
  <p>Diseño moderno · Animación · Experiencia visual</p>

  <button class="neon-btn" onclick="showTab('demo')">
    Ver demo
  </button>
</div>

<!-- DEMO -->
<div id="demo" class="section">
  <h1>🧠 Demo interactiva</h1>

  <div class="card" id="demoText">
    Toca un botón
  </div>

  <button class="neon-btn" onclick="demo('A')">Diseño</button>
  <button class="neon-btn" onclick="demo('B')">Animación</button>
  <button class="neon-btn" onclick="demo('C')">Experiencia</button>
</div>

<!-- ESTILO -->
<div id="style" class="section">
  <h1>🎨 Personaliza</h1>

  <div class="colors">
    <div class="color" style="background:#00ffff" onclick="setColor('#00ffff')"></div>
    <div class="color" style="background:#a020f0" onclick="setColor('#a020f0')"></div>
    <div class="color" style="background:#00ff88" onclick="setColor('#00ff88')"></div>
    <div class="color" style="background:#ffffff; border:1px solid #ccc" onclick="setColor('#ffffff')"></div>
    <div class="color" style="background:#ff3b3b" onclick="setColor('#ff3b3b')"></div>
  </div>

  <div class="card" id="styleText">
    Elige un color
  </div>
</div>

<!-- CONTACTO -->
<div id="contact" class="section">
  <h1>📩 Contacto</h1>

  <p>Solicita tu web personalizada</p>

  <a href="mailto:TUEMAIL@gmail.com">
    <button class="neon-btn">📧 Email</button>
  </a>

  <a href="https://wa.me/33XXXXXXXXX" target="_blank">
    <button class="neon-btn">💬 WhatsApp</button>
  </a>
</div>

<script>

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function demo(type){
  let text="";
  if(type==="A") text="Diseño moderno adaptado.";
  if(type==="B") text="Animaciones fluidas.";
  if(type==="C") text="Experiencia optimizada.";
  document.getElementById("demoText").innerText=text;
}

function setColor(color){
  document.body.style.background =
    "linear-gradient(135deg," + color + "55,#000)";
  document.getElementById("styleText").innerText =
    "Color seleccionado: " + color;
}

</script>

</body>
</html>

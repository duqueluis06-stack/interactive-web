<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Web Premium</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #000);
}

/* NAV */
nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  background: rgba(0,0,0,0.75);
  position: sticky;
  top: 0;
  z-index: 10;
}

nav button {
  flex: 1 1 40%;
  max-width: 150px;
  background: transparent;
  border: 1px solid #0ff;
  color: #0ff;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* 🔴 SALIDA FIJA Y LIMPIA */
.exit-bar {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
}

.exit-bar a {
  padding: 8px 14px;
  border: 2px solid #ff3b3b;
  color: #ff3b3b;
  border-radius: 10px;
  text-decoration: none;
  font-size: 13px;
  background: rgba(0,0,0,0.6);
}

/* SECCIONES */
.section {
  display: none;
  padding: 60px 15px;
}

.active {
  display: block;
}

/* TITULOS */
h1 {
  font-size: 30px;
  text-shadow: 0 0 10px #0ff;
}

/* CARD */
.card {
  margin: 15px auto;
  max-width: 90%;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}

/* BOTONES RGB PRO */
.neon-btn {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  margin: 10px;
  border: 2px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  background: linear-gradient(#000, #000) padding-box,
              linear-gradient(90deg, #00ffff, #ff00ff, #00ff88, #00ffff) border-box;
  transition: 0.3s;
}

.neon-btn:hover {
  transform: scale(1.05);
}

/* COLORES */
.colors {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.color {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
}

/* DESKTOP */
@media(min-width:768px){

  h1 { font-size: 42px; }

  nav button { flex: none; }

  .neon-btn { width: auto; }

  .card { max-width: 600px; }

}

</style>
</head>

<body>

<!-- 🔴 SALIDA -->
<div class="exit-bar">
  <a href="https://duquemartini.com/index.html">⬅ Salir</a>
</div>

<!-- NAV -->
<nav>
  <button onclick="showTab('home')">Inicio</button>
  <button onclick="showTab('demo')">Demo</button>
  <button onclick="showTab('style')">Estilo</button>
  <button onclick="showTab('contact')">Contacto</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <h1>⚡ Webs Interactivas a Medida</h1>
  <p>Diseño moderno · Animación · Experiencia visual</p>

  <button class="neon-btn" onclick="showTab('demo')">
    Ver demo
  </button>
</div>

<!-- DEMO -->
<div id="demo" class="section">
  <h1>🧠 Demo interactiva</h1>

  <div class="card" id="demoText">
    Selecciona una opción
  </div>

  <button class="neon-btn" onclick="demo('A')">Diseño</button>
  <button class="neon-btn" onclick="demo('B')">Animación</button>
  <button class="neon-btn" onclick="demo('C')">Experiencia</button>
</div>

<!-- ESTILO -->
<div id="style" class="section">
  <h1>🎨 Personalización</h1>

  <div class="colors">
    <div class="color" style="background:#00ffff" onclick="setColor('#00ffff')"></div>
    <div class="color" style="background:#a020f0" onclick="setColor('#a020f0')"></div>
    <div class="color" style="background:#00ff88" onclick="setColor('#00ff88')"></div>
    <div class="color" style="background:#ffffff" onclick="setColor('#ffffff')"></div>
    <div class="color" style="background:#ff3b3b" onclick="setColor('#ff3b3b')"></div>
  </div>

  <div class="card" id="styleText">
    Elige un color
  </div>
</div>

<!-- CONTACTO -->
<div id="contact" class="section">
  <h1>📩 Contacto profesional</h1>

  <p>Desarrollo de webs interactivas a medida</p>

  <a href="mailto:duqueluis06@gmail.com">
    <button class="neon-btn">📧 Email</button>
  </a>

  <a href="https://wa.me/33610342894?text=Hola%20Luis,%20quiero%20una%20web%20interactiva" target="_blank">
    <button class="neon-btn">💬 WhatsApp</button>
  </a>
</div>

<script>

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function demo(type){
  let text="";
  if(type==="A") text="Diseño moderno adaptado.";
  if(type==="B") text="Animaciones fluidas.";
  if(type==="C") text="Experiencia optimizada.";
  document.getElementById("demoText").innerText=text;
}

function setColor(color){
  document.body.style.background =
    "linear-gradient(135deg," + color + "55,#000)";
  document.getElementById("styleText").innerText =
    "Color seleccionado: " + color;
}

</script>

</body>
</html>
